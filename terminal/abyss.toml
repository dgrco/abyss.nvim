# abyss — Alacritty theme
# Place in ~/.config/alacritty/themes/abyss.toml
# Then add to your alacritty.toml:
#   [general]
#   import = ["~/.config/alacritty/themes/abyss.toml"]

[colors.primary]
background = "#0a0a0f"
foreground = "#c5c2e8"
dim_foreground = "#6b6894"
bright_foreground = "#e0deff"

[colors.cursor]
text   = "#0a0a0f"
cursor = "#9d78d8"

[colors.vi_mode_cursor]
text   = "#0a0a0f"
cursor = "#7ed4f8"

[colors.search.matches]
foreground = "#c5c2e8"
background = "#2a1f4a"

[colors.search.focused_match]
foreground = "#0a0a0f"
background = "#9d78d8"

[colors.hints.start]
foreground = "#0a0a0f"
background = "#f87ba8"

[colors.hints.end]
foreground = "#0a0a0f"
background = "#5dd6c0"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#0a0a0f"
background = "#9d78d8"

[colors.selection]
text       = "CellForeground"
background = "#221e38"

[colors.normal]
black   = "#0a0a0f"
red     = "#f87ba8"
green   = "#6ed48a"
yellow  = "#d4a84b"
blue    = "#7ed4f8"
magenta = "#c888f0"
cyan    = "#5dd6c0"
white   = "#c5c2e8"

[colors.bright]
black   = "#3b3960"
red     = "#f8a0c0"
green   = "#90e4a8"
yellow  = "#e8c070"
blue    = "#a0e0f8"
magenta = "#d8a0f8"
cyan    = "#80e8d8"
white   = "#e0deff"

[colors.dim]
black   = "#0d0d14"
red     = "#c05070"
green   = "#4ea068"
yellow  = "#a07830"
blue    = "#5090c0"
magenta = "#9060c0"
cyan    = "#40a090"
white   = "#9996cc"
