# abyss — Foot terminal theme
# Place in ~/.config/foot/themes/abyss.ini
# Then in foot.ini add:
#   [colors]
#   include=~/.config/foot/themes/abyss.ini

[colors]
background=0a0a0f
foreground=c5c2e8

# Selected text
selection-background=221e38
selection-foreground=c5c2e8

# Cursor
cursor=9d78d8
cursor-text=0a0a0f

# URLs
urls=7ed4f8

# ANSI — Normal
regular0=0a0a0f
regular1=f87ba8
regular2=6ed48a
regular3=d4a84b
regular4=7ed4f8
regular5=c888f0
regular6=5dd6c0
regular7=c5c2e8

# ANSI — Bright
bright0=3b3960
bright1=f8a0c0
bright2=90e4a8
bright3=e8c070
bright4=a0e0f8
bright5=d8a0f8
bright6=80e8d8
bright7=e0deff

# Dim (foot-specific)
dim0=0d0d14
dim1=c05070
dim2=4ea068
dim3=a07830
dim4=5090c0
dim5=9060c0
dim6=40a090
dim7=9996cc
