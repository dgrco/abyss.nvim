# abyss — Foot terminal theme
# Place in ~/.config/foot/themes/abyss.ini
# Then in foot.ini add:
#   [colors]
#   include=~/.config/foot/themes/abyss.ini

[colors]
background=000000
foreground=faf4ed

# Selected text
selection-background=221e38
selection-foreground=c5c2e8

# Cursor
cursor=faf4ed
cursor-text=000000

# URLs
urls=9ccfd8

# ANSI — Normal
regular0=000000
regular1=eb6f92
regular2=6ed48a
regular3=d4a84b
regular4=9ccfd8
regular5=c4a7e7
regular6=5dd6c0
regular7=faf4ed

# ANSI — Bright
bright0=3b3960
bright1=f087a8
bright2=90e4a8
bright3=e8c070
bright4=b8e4ee
bright5=d8c0f8
bright6=80e8d8
bright7=e0deff

# Dim (foot-specific)
dim0=0d0d14
dim1=a84d68
dim2=4ea068
dim3=a07830
dim4=6090a8
dim5=8068b0
dim6=40a090
dim7=9996cc
