# abyss — Kitty theme
# Place in ~/.config/kitty/themes/abyss.conf
# Then add to kitty.conf:
#   include themes/abyss.conf
# Or use:  kitten themes --reload-in=all abyss

background              #0a0a0f
foreground              #c5c2e8
selection_background    #221e38
selection_foreground    #c5c2e8

cursor                  #9d78d8
cursor_text_color       #0a0a0f

url_color               #7ed4f8

# Window borders
active_border_color     #9d78d8
inactive_border_color   #1a1a28
bell_border_color       #d4a84b

# Tab bar
active_tab_background   #0a0a0f
active_tab_foreground   #c5c2e8
inactive_tab_background #0d0d14
inactive_tab_foreground #524f7a
tab_bar_background      #0d0d14
tab_bar_margin_color    #1a1a28

# Marks
mark1_background        #2a1f4a
mark1_foreground        #c5c2e8
mark2_background        #1a1708
mark2_foreground        #c5c2e8
mark3_background        #0d1f14
mark3_foreground        #c5c2e8

# ANSI colors — normal
color0  #0a0a0f
color1  #f87ba8
color2  #6ed48a
color3  #d4a84b
color4  #7ed4f8
color5  #c888f0
color6  #5dd6c0
color7  #c5c2e8

# ANSI colors — bright
color8  #3b3960
color9  #f8a0c0
color10 #90e4a8
color11 #e8c070
color12 #a0e0f8
color13 #d8a0f8
